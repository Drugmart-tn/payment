<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Secure Payment</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0b0f1a;
      --panel: #111827;
      --card-bg: #161d2e;
      --border: #1e2d45;
      --accent: #00d4ff;
      --accent2: #00ff9d;
      --text: #e8f0ff;
      --muted: #5a6a8a;
      --error: #ff4d6d;
      --selected-glow: 0 0 0 2px var(--accent), 0 0 20px rgba(0,212,255,0.25);
    }

    body {
      font-family: 'Syne', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
      background-image:
        radial-gradient(ellipse 80% 50% at 20% -10%, rgba(0,212,255,0.07) 0%, transparent 60%),
        radial-gradient(ellipse 60% 40% at 80% 110%, rgba(0,255,157,0.05) 0%, transparent 60%);
    }

    .wrapper {
      width: 100%;
      max-width: 560px;
      animation: fadeUp 0.6s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(28px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .header {
      margin-bottom: 2rem;
      text-align: center;
    }

    .header .label {
      font-family: 'DM Mono', monospace;
      font-size: 0.7rem;
      letter-spacing: 0.25em;
      color: var(--accent);
      text-transform: uppercase;
      margin-bottom: 0.5rem;
    }

    .header h1 {
      font-size: 2rem;
      font-weight: 800;
      letter-spacing: -0.02em;
      background: linear-gradient(135deg, #e8f0ff 30%, var(--accent) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .header p {
      font-family: 'DM Mono', monospace;
      font-size: 0.78rem;
      color: var(--muted);
      margin-top: 0.4rem;
    }

    /* ── BANK GRID ── */
    .section-label {
      font-family: 'DM Mono', monospace;
      font-size: 0.65rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 0.75rem;
    }

    .bank-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 0.65rem;
      margin-bottom: 1.8rem;
    }

    .bank-btn {
      position: relative;
      background: var(--card-bg);
      border: 1.5px solid var(--border);
      border-radius: 12px;
      padding: 0.85rem 0.5rem;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.45rem;
      transition: border-color 0.2s, box-shadow 0.2s, transform 0.15s;
      outline: none;
      user-select: none;
    }

    .bank-btn:hover {
      border-color: rgba(0,212,255,0.4);
      transform: translateY(-2px);
    }

    .bank-btn.active {
      border-color: var(--accent);
      box-shadow: var(--selected-glow);
      background: rgba(0,212,255,0.06);
    }

    .bank-btn .check {
      position: absolute;
      top: 6px; right: 8px;
      font-size: 0.65rem;
      color: var(--accent);
      opacity: 0;
      transition: opacity 0.15s;
    }

    .bank-btn.active .check { opacity: 1; }

    .bank-logo {
      width: 38px;
      height: 38px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 800;
      font-size: 0.7rem;
      letter-spacing: 0.02em;
      flex-shrink: 0;
    }

    .bank-name {
      font-size: 0.68rem;
      font-weight: 700;
      letter-spacing: 0.04em;
      color: var(--text);
      text-align: center;
      line-height: 1.2;
    }

    /* Bank brand colours */
    .logo-tyme { background: #00c4a0; color: #001a15; }
    .logo-cap  { background: #0066cc; color: #fff; }
    .logo-absa { background: #dc143c; color: #fff; }
    .logo-std  { background: #12407c; color: #fff; }
    .logo-ned  { background: #007b3e; color: #fff; }
    .logo-fnb  { background: #e87722; color: #fff; }

    /* ── CARD PREVIEW ── */
    .card-preview {
      background: linear-gradient(135deg, #1a2744 0%, #0d1929 100%);
      border: 1.5px solid var(--border);
      border-radius: 18px;
      padding: 1.4rem 1.6rem;
      margin-bottom: 1.8rem;
      position: relative;
      overflow: hidden;
      min-height: 160px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    .card-preview::before {
      content: '';
      position: absolute;
      top: -40px; right: -40px;
      width: 160px; height: 160px;
      background: radial-gradient(circle, rgba(0,212,255,0.12) 0%, transparent 70%);
      border-radius: 50%;
    }

    .card-chip {
      width: 36px; height: 26px;
      background: linear-gradient(135deg, #c8a84b, #f0d080, #b8941a);
      border-radius: 5px;
      margin-bottom: 1.2rem;
    }

    .card-number-display {
      font-family: 'DM Mono', monospace;
      font-size: 1.05rem;
      letter-spacing: 0.18em;
      color: var(--text);
      margin-bottom: 1rem;
    }

    .card-footer {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
    }

    .card-meta { display: flex; flex-direction: column; gap: 2px; }

    .card-meta-label {
      font-family: 'DM Mono', monospace;
      font-size: 0.55rem;
      letter-spacing: 0.15em;
      color: var(--muted);
      text-transform: uppercase;
    }

    .card-meta-value {
      font-family: 'DM Mono', monospace;
      font-size: 0.78rem;
      color: var(--text);
    }

    .card-bank-badge {
      font-size: 0.6rem;
      font-weight: 800;
      letter-spacing: 0.1em;
      padding: 4px 10px;
      border-radius: 20px;
      background: rgba(255,255,255,0.08);
      color: var(--muted);
      transition: all 0.3s;
    }

    /* ── FORM ── */
    .form-section { margin-bottom: 1.8rem; }

    .input-group {
      position: relative;
      margin-bottom: 1rem;
    }

    .input-group label {
      display: block;
      font-family: 'DM Mono', monospace;
      font-size: 0.65rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 0.45rem;
    }

    .input-group input {
      width: 100%;
      background: var(--card-bg);
      border: 1.5px solid var(--border);
      border-radius: 10px;
      padding: 0.85rem 1rem;
      font-family: 'DM Mono', monospace;
      font-size: 0.92rem;
      color: var(--text);
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
      letter-spacing: 0.05em;
    }

    .input-group input::placeholder { color: var(--muted); }

    .input-group input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(0,212,255,0.12);
    }

    .input-group .icon {
      position: absolute;
      right: 1rem;
      bottom: 0.88rem;
      font-size: 1rem;
      color: var(--muted);
      pointer-events: none;
    }

    .row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem; }

    /* ── SUBMIT ── */
    .pay-btn {
      width: 100%;
      padding: 1rem;
      background: linear-gradient(135deg, var(--accent) 0%, #0099cc 100%);
      color: #001520;
      border: none;
      border-radius: 12px;
      font-family: 'Syne', sans-serif;
      font-size: 1rem;
      font-weight: 800;
      letter-spacing: 0.06em;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.15s, box-shadow 0.2s;
      text-transform: uppercase;
      box-shadow: 0 4px 24px rgba(0,212,255,0.25);
    }

    .pay-btn:hover {
      opacity: 0.92;
      transform: translateY(-1px);
      box-shadow: 0 8px 32px rgba(0,212,255,0.35);
    }

    .pay-btn:active { transform: translateY(0); }

    .secure-note {
      text-align: center;
      font-family: 'DM Mono', monospace;
      font-size: 0.65rem;
      color: var(--muted);
      margin-top: 1rem;
      letter-spacing: 0.1em;
    }

    .secure-note span { color: var(--accent2); }

    /* ── SUCCESS ── */
    .success-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(11,15,26,0.95);
      z-index: 999;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 1rem;
      animation: fadeIn 0.3s ease;
    }

    .success-overlay.show { display: flex; }

    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

    .success-icon {
      width: 80px; height: 80px;
      border-radius: 50%;
      background: rgba(0,255,157,0.1);
      border: 2px solid var(--accent2);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
      animation: pop 0.4s 0.1s cubic-bezier(.175,.885,.32,1.275) both;
    }

    @keyframes pop {
      from { transform: scale(0); }
      to   { transform: scale(1); }
    }

    .success-overlay h2 {
      font-size: 1.6rem;
      font-weight: 800;
      color: var(--accent2);
    }

    .success-overlay p {
      font-family: 'DM Mono', monospace;
      font-size: 0.8rem;
      color: var(--muted);
    }

    .success-overlay button {
      margin-top: 1rem;
      padding: 0.6rem 2rem;
      background: none;
      border: 1.5px solid var(--accent2);
      color: var(--accent2);
      border-radius: 8px;
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 0.85rem;
      cursor: pointer;
      letter-spacing: 0.1em;
    }

    /* Validation */
    .input-group input.error { border-color: var(--error); }
    .err-msg {
      font-family: 'DM Mono', monospace;
      font-size: 0.6rem;
      color: var(--error);
      margin-top: 0.3rem;
      letter-spacing: 0.05em;
    }
  </style>
</head>
<body>

<div class="wrapper">
  <div class="header">
    <div class="label">🔒 Secure Checkout</div>
    <h1>Payment Details</h1>
    <p>Select your bank &amp; enter card information</p>
  </div>

  <!-- Bank selector -->
  <div class="section-label">Choose your bank</div>
  <div class="bank-grid">
    <button class="bank-btn" data-bank="TymeBank" onclick="selectBank(this)">
      <span class="check">✔</span>
      <div class="bank-logo logo-tyme">TYM</div>
      <span class="bank-name">TymeBank</span>
    </button>
    <button class="bank-btn" data-bank="Capitec" onclick="selectBank(this)">
      <span class="check">✔</span>
      <div class="bank-logo logo-cap">CAP</div>
      <span class="bank-name">Capitec</span>
    </button>
    <button class="bank-btn" data-bank="ABSA" onclick="selectBank(this)">
      <span class="check">✔</span>
      <div class="bank-logo logo-absa">ABS</div>
      <span class="bank-name">ABSA</span>
    </button>
    <button class="bank-btn" data-bank="Standard Bank" onclick="selectBank(this)">
      <span class="check">✔</span>
      <div class="bank-logo logo-std">STD</div>
      <span class="bank-name">Standard Bank</span>
    </button>
    <button class="bank-btn" data-bank="Nedbank" onclick="selectBank(this)">
      <span class="check">✔</span>
      <div class="bank-logo logo-ned">NED</div>
      <span class="bank-name">Nedbank</span>
    </button>
    <button class="bank-btn" data-bank="FNB" onclick="selectBank(this)">
      <span class="check">✔</span>
      <div class="bank-logo logo-fnb">FNB</div>
      <span class="bank-name">FNB</span>
    </button>
  </div>

  <!-- Card Preview -->
  <div class="card-preview">
    <div class="card-chip"></div>
    <div class="card-number-display" id="cardDisplay">•••• &nbsp;•••• &nbsp;•••• &nbsp;••••</div>
    <div class="card-footer">
      <div class="card-meta">
        <span class="card-meta-label">Expires</span>
        <span class="card-meta-value" id="expiryDisplay">MM / YY</span>
      </div>
      <div class="card-bank-badge" id="bankBadge">SELECT BANK</div>
    </div>
  </div>

  <!-- Form Fields -->
  <div class="form-section">
    <div class="section-label">Card information</div>

    <div class="input-group">
      <label for="cardNumber">Card Number</label>
      <input type="text" id="cardNumber" placeholder="0000 0000 0000 0000" maxlength="19"
             oninput="formatCardNumber(this)" />
      <span class="icon">💳</span>
      <div class="err-msg" id="cardErr"></div>
    </div>

    <div class="row-2">
      <div class="input-group">
        <label for="expiry">Expiration Date</label>
        <input type="text" id="expiry" placeholder="MM / YY" maxlength="7"
               oninput="formatExpiry(this)" />
        <div class="err-msg" id="expiryErr"></div>
      </div>
      <div class="input-group">
        <label for="cvv">CVV</label>
        <input type="text" id="cvv" placeholder="•••" maxlength="4"
               oninput="this.value=this.value.replace(/\D/g,'')" />
        <span class="icon">🔐</span>
        <div class="err-msg" id="cvvErr"></div>
      </div>
    </div>
  </div>

  <!-- Contact -->
  <div class="form-section">
    <div class="section-label">Contact number</div>
    <div class="input-group">
      <label for="phone">Cellphone Number</label>
      <input type="tel" id="phone" placeholder="+27 00 000 0000"
             oninput="formatPhone(this)" maxlength="16" />
      <span class="icon">📱</span>
      <div class="err-msg" id="phoneErr"></div>
    </div>
  </div>

  <!-- Submit -->
  <button class="pay-btn" onclick="submitPayment()">PAY NOW</button>

  <p class="secure-note"><span>256-bit SSL</span> encrypted &nbsp;·&nbsp; Your data is safe &amp; secure</p>
</div>

<!-- Success overlay -->
<div class="success-overlay" id="successOverlay">
  <div class="success-icon">✓</div>
  <h2>Payment Sent!</h2>
  <p id="successMsg">Processing your transaction…</p>
  <button onclick="reset()">New Payment</button>
</div>

<script>
  let selectedBank = null;

  function selectBank(btn) {
    document.querySelectorAll('.bank-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    selectedBank = btn.dataset.bank;
    document.getElementById('bankBadge').textContent = selectedBank.toUpperCase();
    document.getElementById('bankBadge').style.color = '#00d4ff';
    document.getElementById('bankBadge').style.borderColor = 'rgba(0,212,255,0.3)';
  }

  function formatCardNumber(input) {
    let v = input.value.replace(/\D/g, '').slice(0, 16);
    let formatted = v.replace(/(.{4})/g, '$1 ').trim();
    input.value = formatted;
    // Update preview
    let display = v.padEnd(16, '•');
    let parts = display.match(/.{1,4}/g) || [];
    document.getElementById('cardDisplay').innerHTML =
      parts.map(p => p.split('').map((c,i) => v[parts.slice(0,parts.indexOf(p)).join('').length + i] ? c : '•').join('')).join(' &nbsp;');
    // Re-render properly
    let raw = v.split('');
    let out = '';
    for(let i=0;i<16;i++){
      if(i>0&&i%4===0) out+=' &nbsp;';
      out += raw[i] ? raw[i] : '•';
    }
    document.getElementById('cardDisplay').innerHTML = out;
  }

  function formatExpiry(input) {
    let v = input.value.replace(/\D/g,'').slice(0,4);
    if(v.length>2) v = v.slice(0,2)+' / '+v.slice(2);
    input.value = v;
    document.getElementById('expiryDisplay').textContent = v || 'MM / YY';
  }

  function formatPhone(input) {
    let v = input.value.replace(/[^\d+\s]/g,'');
    input.value = v;
  }

  function showErr(id, msg) {
    const el = document.getElementById(id);
    el.textContent = msg;
  }

  function clearErrs() {
    ['cardErr','expiryErr','cvvErr','phoneErr'].forEach(id => document.getElementById(id).textContent='');
    ['cardNumber','expiry','cvv','phone'].forEach(id => document.getElementById(id).classList.remove('error'));
  }

  function submitPayment() {
    clearErrs();
    let valid = true;

    if(!selectedBank) {
      alert('⚠️ Please select your bank first.');
      return;
    }

    const card = document.getElementById('cardNumber').value.replace(/\s/g,'');
    if(card.length !== 16) {
      showErr('cardErr','Enter a valid 16-digit card number');
      document.getElementById('cardNumber').classList.add('error');
      valid = false;
    }

    const expiry = document.getElementById('expiry').value.replace(/\s/g,'');
    if(!/^\d{2}\/\d{2}$/.test(expiry)) {
      showErr('expiryErr','Format: MM / YY');
      document.getElementById('expiry').classList.add('error');
      valid = false;
    }

    const cvv = document.getElementById('cvv').value;
    if(cvv.length < 3) {
      showErr('cvvErr','Enter 3 or 4 digit CVV');
      document.getElementById('cvv').classList.add('error');
      valid = false;
    }

    const phone = document.getElementById('phone').value.replace(/\s/g,'');
    if(phone.length < 10) {
      showErr('phoneErr','Enter a valid cellphone number');
      document.getElementById('phone').classList.add('error');
      valid = false;
    }

    if(!valid) return;

    document.getElementById('successMsg').textContent =
      `Paying via ${selectedBank} · Card ending ${card.slice(-4)}`;
    document.getElementById('successOverlay').classList.add('show');
  }

  function reset() {
    document.getElementById('successOverlay').classList.remove('show');
    document.querySelectorAll('.bank-btn').forEach(b => b.classList.remove('active'));
    selectedBank = null;
    document.getElementById('bankBadge').textContent = 'SELECT BANK';
    document.getElementById('bankBadge').style.color = '';
    ['cardNumber','expiry','cvv','phone'].forEach(id => document.getElementById(id).value='');
    document.getElementById('cardDisplay').innerHTML = '•••• &nbsp;•••• &nbsp;•••• &nbsp;••••';
    document.getElementById('expiryDisplay').textContent = 'MM / YY';
    clearErrs();
  }
</script>
</body>
</html>
